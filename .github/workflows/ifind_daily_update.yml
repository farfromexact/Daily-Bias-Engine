name: Daily iFinD Data Update

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ifind-daily-update
  cancel-in-progress: false

jobs:
  update-ifind-data:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install iFinDPy

      - name: Update iFinD data
        shell: pwsh
        env:
          IFIND_USERNAME: ${{ secrets.IFIND_USERNAME }}
          IFIND_PASSWORD: ${{ secrets.IFIND_PASSWORD }}
        run: |
          if (-not $env:IFIND_USERNAME -or -not $env:IFIND_PASSWORD) {
            throw "Missing IFIND_USERNAME or IFIND_PASSWORD repository secrets."
          }
          python scripts/update_ifind_data.py

      - name: Smoke check latest dashboard data
        shell: pwsh
        run: |
          python -c "from apps.streamlit_app import run_dashboard_pipeline; print(run_dashboard_pipeline()['report']['latest']['date'])"

      - name: Commit updated data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/snapshots data/options_ifind
          git add -f data/snapshots data/options_ifind
          if (git diff --cached --quiet) {
            Write-Host "No data changes to commit."
            exit 0
          }
          $chinaTime = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date), "China Standard Time")
          $stamp = $chinaTime.ToString("yyyy-MM-dd")
          git commit -m "chore(data): update iFinD snapshots $stamp"
          git push
